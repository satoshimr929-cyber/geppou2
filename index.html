<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作業月報 入力フォーム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3352;--accent:#4f7cff;--accent2:#00d4aa;--warn:#ff6b6b;--text:#e8eaf6;--text-muted:#7b82b0;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px 16px 60px;}
  .header{text-align:center;margin-bottom:32px;}
  .header h1{font-size:26px;font-weight:700;letter-spacing:.1em;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;}
  .header p{color:var(--text-muted);font-size:13px;}
  .meta-section{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;max-width:700px;margin-left:auto;margin-right:auto;}
  .field label{display:block;font-size:11px;font-weight:500;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
  .field input,.field select{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;padding:10px 14px;outline:none;transition:border-color .2s;}
  .field input:focus,.field select:focus{border-color:var(--accent);}
  .section-title{font-size:12px;font-weight:700;letter-spacing:.12em;color:var(--text-muted);text-transform:uppercase;margin-bottom:12px;max-width:700px;margin-left:auto;margin-right:auto;border-left:3px solid var(--accent);padding-left:10px;}
  .days-container{max-width:700px;margin:0 auto 16px;display:flex;flex-direction:column;gap:6px;}
  .day-row{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .2s;}
  .day-row:hover{border-color:var(--accent);}
  .day-row.rest{opacity:.6;}
  .day-header{display:flex;align-items:center;padding:10px 14px;cursor:pointer;gap:10px;user-select:none;}
  .day-num{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--text-muted);min-width:32px;}
  .day-youbi{font-size:12px;font-weight:700;min-width:18px;text-align:center;}
  .sat .day-youbi{color:#4f9fff;}.sun .day-youbi{color:var(--warn);}
  .day-summary{flex:1;font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .empty{color:var(--text-muted);font-style:italic;}
  .day-badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;}
  .badge-work{background:#4f7cff22;color:var(--accent);}
  .badge-off{background:#ffffff10;color:var(--text-muted);}
  .badge-holiday{background:#ff6b6b22;color:var(--warn);}
  .badge-paid{background:#00d4aa22;color:var(--accent2);}
  .badge-daikyu{background:#ffaa0022;color:#ffaa00;}
  .badge-holi-work{background:#ff9f4322;color:#ff9f43;}
  .chevron{color:var(--text-muted);font-size:12px;transition:transform .2s;}
  .day-row.open .chevron{transform:rotate(90deg);}
  .day-body{display:none;padding:14px;border-top:1px solid var(--border);}
  .day-row.open .day-body{display:block;}
  .day-body-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .day-body-grid .full{grid-column:1/-1;}
  .day-body .field label{font-size:10px;}
  .day-body .field input{font-size:13px;padding:8px 10px;border-radius:6px;}
  .quick-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
  .quick-btn{font-size:11px;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s;}
  .quick-btn:hover{border-color:var(--accent);color:var(--accent);}
  .qb-work.on{border-color:var(--accent);background:#4f7cff22;color:var(--accent);}
  .qb-holi-work.on{border-color:#ff9f43;background:#ff9f4322;color:#ff9f43;}
  .qb-off.on{border-color:#888;background:#ffffff10;color:#aaa;}
  .qb-paid.on{border-color:var(--accent2);background:#00d4aa22;color:var(--accent2);}
  .qb-daikyu.on{border-color:#ffaa00;background:#ffaa0022;color:#ffaa00;}
  .qb-holiday.on{border-color:var(--warn);background:#ff6b6b22;color:var(--warn);}
  .summary-box{max-width:700px;margin:0 auto 16px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:16px 20px;}
  .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .summary-item{text-align:center;}
  .summary-item .val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;color:var(--accent);}
  .summary-item .val.green{color:var(--accent2);}
  .summary-item .val.orange{color:#ffaa00;}
  .summary-item .lbl{font-size:11px;color:var(--text-muted);margin-top:2px;}
  .meta-extra{max-width:700px;margin:0 auto 28px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .btn-row{max-width:700px;margin:0 auto;display:flex;gap:10px;justify-content:center;}
  .btn{padding:12px 28px;border-radius:10px;border:none;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.05em;}
  .btn-primary{background:linear-gradient(135deg,var(--accent),#7b5cf5);color:white;}
  .btn-primary:hover{opacity:.85;transform:translateY(-1px);}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1.5px solid var(--border);}
  .btn-secondary:hover{border-color:var(--accent);}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent2);color:#0f1117;font-weight:700;font-size:13px;padding:12px 24px;border-radius:30px;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .loading-bar{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s;z-index:1000;}
  @media(max-width:480px){.meta-section,.meta-extra,.summary-grid{grid-template-columns:1fr;}.day-body-grid{grid-template-columns:1fr;}}

  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);margin:0 3px;}
  .dot:nth-child(1){animation:pulse 1.2s 0s infinite;}
  .dot:nth-child(2){animation:pulse 1.2s .4s infinite;}
  .dot:nth-child(3){animation:pulse 1.2s .8s infinite;}
</style>
</head>
<body>
<div class="loading-bar" id="loadingBar" style="position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s;z-index:1000;width:0%"></div>

<datalist id="site-list"></datalist>

<div class="header">
  <h1>作業月報　入力フォーム</h1>
  <p id="saveIndicator" style="font-size:12px;color:var(--accent2);opacity:0;transition:opacity .5s;height:18px;">✅ 自動保存しました</p>
</div>

<div style="max-width:700px;margin:0 auto 20px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--text-muted);display:flex;align-items:center;gap:10px;" id="statusBar">
  <div id="dots" style="display:flex;"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  <span id="statusMsg">Pythonエンジンを準備中... （初回のみ時間がかかります）</span>
</div>

<div class="meta-section">
  <div class="field"><label>名前</label>
    <input type="text" id="name" value=""></div>
  <div class="field"><label>対象月（16日始まり）</label>
    <select id="yearmonth" style="width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;padding:10px 14px;outline:none;"></select>
  </div>
</div>

<div class="section-title">現場名リスト</div>
<div style="max-width:700px;margin:0 auto 20px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;">
  <div id="siteTagList" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;min-height:28px;"></div>
  <div style="display:flex;gap:8px;">
    <input type="text" id="siteInput" placeholder="現場名を入力してEnterまたは追加"
      style="flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;padding:8px 12px;outline:none;"
      onkeydown="if(event.key==='Enter'){event.preventDefault();addSite();}">
    <button onclick="addSite()" style="padding:8px 16px;border-radius:8px;border:none;background:var(--accent);color:white;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;">追加</button>
  </div>
</div>

<div class="section-title">日別入力（クリックで展開）</div>
<div class="days-container" id="daysContainer"></div>

<div class="section-title">集計</div>
<div class="summary-box">
  <div class="summary-grid">
    <div class="summary-item"><div class="val" id="sumWork">0</div><div class="lbl">出勤日数</div></div>
    <div class="summary-item"><div class="val green" id="sumPaid">0</div><div class="lbl">有給日数</div></div>
    <div class="summary-item"><div class="val orange" id="sumDaikyu">0</div><div class="lbl">代休使用日数</div></div>
    <div class="summary-item"><div class="val orange" id="sumHoliWork">0</div><div class="lbl">休日出勤日数</div></div>
    <div class="summary-item"><div class="val" id="sumAbsent" style="color:var(--warn)">0</div><div class="lbl">欠勤日数</div></div>
    <div class="summary-item"><div class="val" id="sumBase">0</div><div class="lbl">基本作業日数(自動)</div></div>
    <div class="summary-item"><div class="val" id="sumTotal">0</div><div class="lbl">合計出勤日数(自動)</div></div>
    <div class="summary-item"><div class="val" id="sumHayade">0</div><div class="lbl">早出（時間）</div></div>
    <div class="summary-item"><div class="val" id="sumZangyo">0</div><div class="lbl">残業（時間）</div></div>
    <div class="summary-item"><div class="val" id="sumDaikyuZan" style="color:#ffaa00">0</div><div class="lbl">今月代休残日数</div></div>
  </div>
</div>

<div class="section-title">その他入力</div>
<div class="meta-extra">
  <div class="field"><label>前月迄の代休残日数</label>
    <input type="number" id="prevDaikyu" min="0" max="99" value="0"></div>
  <div class="field" style="grid-column:1/-1">
    <label>担当現場（複数可）</label>
    <div id="tantoSiteList" style="display:flex;flex-direction:column;gap:6px;">
      <select class="tanto-input" onchange="if(this.value==='__manual__'){this.style.display='none';this.nextElementSibling.style.display='block';this.nextElementSibling.focus();}else{saveData();}"
        style="width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;padding:8px 12px;outline:none;">
        <option value="">-- 現場を選択 --</option>
        <option value="__manual__">✏️ 直接入力...</option>
      </select>
      <input type="text" placeholder="現場名を入力"
        style="width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;padding:8px 12px;outline:none;display:none;"
        oninput="saveData()" onchange="saveData()">
    </div>
    <button onclick="addTantoRow()" style="margin-top:8px;padding:6px 14px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--text-muted);font-family:'Noto Sans JP',sans-serif;font-size:12px;cursor:pointer;">＋ 現場を追加</button>
  </div>
</div>

<div class="section-title">現場管理日程表</div>
<div style="max-width:700px;margin:0 auto 20px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;">
  <div class="field" style="margin-bottom:12px;">
    <label>対象現場</label>
    <select id="kanriSiteSelect"
      style="width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;padding:8px 12px;outline:none;"
      onchange="saveData();updateKanriBtn();renderKanriDays()">
      <option value="">-- 現場を選択 --</option>
    </select>
  </div>
  <div class="field" style="margin-bottom:12px;">
    <label>担当者</label>
    <input type="text" id="kanriTanto" placeholder="担当者名を入力"
      style="width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;padding:8px 12px;outline:none;"
      oninput="saveData()" onchange="saveData()">
  </div>
  <div class="field" style="margin-bottom:12px;">
    <label>作業者登録（全月共通）</label>
    <div id="workerTagList" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;min-height:28px;"></div>
    <div style="display:flex;gap:8px;">
      <input type="text" id="workerInput" placeholder="作業者名を入力してEnterまたは追加"
        style="flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;padding:8px 12px;outline:none;"
        onkeydown="if(event.key==='Enter'){event.preventDefault();addWorker();}">
      <button onclick="addWorker()" style="padding:8px 16px;border-radius:8px;border:none;background:var(--accent);color:white;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;">追加</button>
    </div>
  </div>
  <div id="kanriDaySection" style="display:none;">
    <div class="field" style="margin-bottom:12px;">
      <label>一括選択（全日に適用）</label>
      <div id="kanriBulkChips" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;"></div>
      <button onclick="applyKanriBulk()" style="padding:8px 16px;border-radius:8px;border:none;background:var(--accent);color:white;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;">一括適用</button>
    </div>
    <div class="field">
      <label>日にちごとの作業者（タップで選択）</label>
      <div id="kanriDayList" style="display:flex;flex-direction:column;gap:8px;"></div>
    </div>
  </div>
</div>

<div class="section-title">コメント・目標</div>
<div style="max-width:700px;margin:0 auto 20px;display:flex;flex-direction:column;gap:10px;">
  <div class="field">
    <label>本人コメント</label>
    <textarea id="honninComment" rows="3" placeholder="本人コメントを入力"
      style="width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;padding:10px 14px;outline:none;resize:vertical;"
      oninput="saveData()" onchange="saveData()"></textarea>
  </div>
  <div class="field">
    <label>要望事項</label>
    <textarea id="yoboJiko" rows="3" placeholder="要望事項を入力"
      style="width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;padding:10px 14px;outline:none;resize:vertical;"
      oninput="saveData()" onchange="saveData()"></textarea>
  </div>
  <div class="field">
    <label>１年間の目標（仕事）</label>
    <input type="text" id="goalShigoto" placeholder="仕事の目標"
      style="width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;padding:10px 14px;outline:none;"
      oninput="saveData()" onchange="saveData()">
  </div>
  <div class="field">
    <label>１年間の目標（人格）</label>
    <input type="text" id="goalJinkaku" placeholder="人格の目標"
      style="width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;padding:10px 14px;outline:none;"
      oninput="saveData()" onchange="saveData()">
  </div>
  <div class="field">
    <label>１年間の目標（その他）</label>
    <input type="text" id="goalSonota" placeholder="その他の目標"
      style="width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;padding:10px 14px;outline:none;"
      oninput="saveData()" onchange="saveData()">
  </div>
</div>

<div class="section-title">クラウド連携（GitHub Gist）</div>
<div style="max-width:700px;margin:0 auto 20px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;">
  <div class="field">
    <label>GitHubトークン（ghp_xxxxx）</label>
    <input type="password" id="githubToken" placeholder="ghp_..."
      style="width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;padding:8px 12px;outline:none;"
      oninput="localStorage.setItem('gist_token',this.value)"
      value="">
  </div>
  <p style="font-size:11px;color:var(--text-muted);margin-top:8px;">トークンはこのデバイスのみに保存されます。☁️クラウド保存で全デバイスと同期できます。</p>
</div>


<div style="max-width:700px;margin:0 auto;display:flex;flex-direction:column;gap:8px;">
  <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
    <button class="btn btn-secondary" onclick="clearAll()">リセット</button>
    <button class="btn btn-secondary" onclick="exportJSON()">💾 バックアップ</button>
    <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">📂 読み込み</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(this)">
    <button class="btn btn-secondary" onclick="gistSave()">☁️ クラウド保存</button>
    <button class="btn btn-secondary" onclick="gistLoad()">🔄 クラウド読込</button>
  </div>
  <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
    <button class="btn btn-primary" id="exportBtn" onclick="exportExcel()" disabled>⏳ 準備中...</button>
    <button class="btn btn-secondary" id="holiBtn" onclick="exportHoliReport()" style="display:none">📋 休日出勤報告書</button>
    <button class="btn btn-secondary" id="kanriBtn" onclick="exportKanriReport()" style="display:none">📊 現場管理日程表</button>
  </div>
</div>

// ── Pyodide ──
function setStatus(msg, ready) {
  document.getElementById('statusMsg').textContent = msg;
  document.getElementById('dots').style.display = ready ? 'none' : 'flex';
  document.getElementById('statusBar').style.borderColor = ready ? 'var(--accent2)' : 'var(--border)';
}

async function initPyodide() {
  const bar = document.getElementById('loadingBar');
  try {
    bar.style.width = '20%';
    setStatus('Pyodide読み込み中...', false);
    const py = await loadPyodide({ indexURL: "https://cdn.jsdelivr.net/pyodide/v0.26.2/full/" });
    bar.style.width = '60%';
    setStatus('openpyxl読み込み中...', false);
    await py.loadPackage("micropip");
    await py.runPythonAsync(`
import micropip
await micropip.install('openpyxl')
`);
    bar.style.width = '90%';
    setStatus('初期化中...', false);
    py.runPython(atob(PY_CODE_B64));
    try { py.runPython(atob(HOLI_CODE_B64)); } catch(e2) { console.warn(e2); }
    pyodide = py;
    bar.style.width = '100%';
    setTimeout(() => { bar.style.width = '0%'; }, 500);
    setStatus('✅ 準備完了', true);
    const btn = document.getElementById('exportBtn');
    btn.disabled = false; btn.textContent = '📥 Excelを出力';
    updateHoliBtn();
    updateKanriBtn();
  } catch(e) {
    bar.style.width = '0%';
    console.error(e);
    setStatus('⚠️ 読み込みエラー: ' + (e.message||'').slice(0,80), false);
    document.getElementById('exportBtn').disabled = false;
    document.getElementById('exportBtn').textContent = '🔄 再試行';
    document.getElementById('exportBtn').onclick = () => location.reload();
  }
}

// ── 現場名 ──
function addSite() {
  const inp = document.getElementById('siteInput'), val = inp.value.trim();
  if (!val || siteList.includes(val)) { inp.value = ''; return; }
  siteList.push(val); inp.value = '';
  renderSiteTags(); updateDatalist(); saveData();
}
function removeSite(name) { siteList = siteList.filter(s=>s!==name); renderSiteTags(); updateDatalist(); saveData(); }
function renderSiteTags() {
  document.getElementById('siteTagList').innerHTML = siteList.map(s =>
    `<span style="display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1.5px solid var(--border);border-radius:20px;padding:4px 12px;font-size:13px;">
      ${s}<button onclick="removeSite(${JSON.stringify(s)})" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:0;">×</button>
    </span>`).join('');
  updateKanriSiteSelect();
}
function updateDatalist() {
  document.getElementById('site-list').innerHTML = siteList.map(s=>`<option value="${s}">`).join('');
  // 日別入力のselectも更新
  document.querySelectorAll('[id^="sel-"]').forEach(sel => {
    const i = sel.id.replace('sel-','');
    const cur = rows[i]?.site || '';
    const opts = siteList.map(s=>`<option value="${s}" ${s===cur?'selected':''}>${s}</option>`).join('');
    sel.innerHTML = `<option value="">-- 現場を選択 --</option>${opts}<option value="__manual__">✏️ 直接入力...</option>`;
    if (cur && !siteList.includes(cur)) sel.value = '';
  });
}

// ── 担当現場 ──
function addTantoRow(val='') {
  const c = document.getElementById('tantoSiteList'), row = document.createElement('div');
  row.style.cssText = 'display:flex;gap:6px;align-items:center;';
  const opts = siteList.map(s=>`<option value="${s}" ${s===val?'selected':''}>${s}</option>`).join('');
  row.innerHTML = `
    <select class="tanto-input" onchange="if(this.value==='__manual__'){this.style.display='none';this.nextElementSibling.style.display='block';this.nextElementSibling.focus();}else{saveData();}"
      style="flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;padding:8px 10px;outline:none;">
      <option value="">-- 現場を選択 --</option>
      ${opts}
      <option value="__manual__">✏️ 直接入力...</option>
    </select>
    <input type="text" placeholder="現場名を入力" value="${siteList.includes(val)?'':val}"
      style="flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;padding:8px 10px;outline:none;display:${siteList.includes(val)||!val?'none':'block'};"
      oninput="saveData()" onchange="saveData()">
    <button onclick="this.parentElement.remove();saveData()"
      style="padding:6px 10px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--text-muted);font-size:14px;cursor:pointer;">×</button>`;
  c.appendChild(row);
  row.querySelector('select').addEventListener('change', saveData);
}
function getTantoSites() {
  return [...document.getElementById('tantoSiteList').children].map(row => {
    const sel = row.querySelector('select');
    const inp = row.querySelector('input');
    if (inp && inp.style.display !== 'none') return inp.value.trim();
    if (sel && sel.value && sel.value !== '__manual__') return sel.value.trim();
    return '';
  }).filter(Boolean);
}

// ── 月選択 ──
function buildMonthSelect() {
  const sel = document.getElementById('yearmonth'), now = new Date();
  let endY=now.getFullYear(), endM=now.getMonth()+2;
  if (endM>12) { endM-=12; endY++; }
  sel.innerHTML = '';
  // 今年の4月から翌月まで全部表示
  let y=now.getFullYear(), m=4;
  while (y<endY||(y===endY&&m<=endM)) {
    const val=`${y}-${String(m).padStart(2,'0')}`;
    const nm=m===12?1:m+1, ny=m===12?y+1:y;
    const dm=m===12?1:m+1, dy=m===12?y+1:y;
    sel.innerHTML += `<option value="${val}">${dy}年${dm}月分（${y}/${m}/16〜${ny}/${nm}/15）</option>`;
    m++; if(m>12){m=1;y++;}
  }
  // デフォルトは今月
  const def=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  if ([...sel.options].some(o=>o.value===def)) sel.value=def;
  else sel.value=sel.options[sel.options.length-1].value;
}

// ── フォーム ──
function buildDays() {
  const ym=document.getElementById('yearmonth').value; if(!ym) return;
  const [y,m]=ym.split('-').map(Number); rows=[];
  for(let i=0;i<31;i++){
    const d=new Date(y,m-1,16+i); if(d>new Date(y,m,15)) break;
    const dw=d.getDay(), isWE=dw===0||dw===6;
    rows.push({date:new Date(d),youbi:YOUBI[dw],isWeekend:isWE,
      site:'',task:'',start:isWE?'':DEFAULT_START,end:isWE?'':DEFAULT_END,
      hayade:'',zangyo:'',type:isWE?'off':'work'});
  }
  renderDays();
}
function renderDays() {
  const cont=document.getElementById('daysContainer'); cont.innerHTML='';
  const TYPES=['work','holi-work','off','paid','daikyu','holiday','absent'];
  rows.forEach((r,i)=>{
    const d=r.date, dateStr=`${d.getMonth()+1}/${d.getDate()}`;
    const isOff=r.type!=='work'&&r.type!=='holi-work';
    const badge=r.type!=='off'?`<span class="day-badge ${BADGE_CLS[r.type]}">${TYPE_LABEL[r.type]}</span>`:'';
    const summary=!isOff?(r.site?`${r.site}${r.task?'　'+r.task:''}`:'<span class="empty">未入力</span>'):TYPE_LABEL[r.type];
    const rowCls=['day-row',r.isWeekend&&d.getDay()===6?'sat':'',r.isWeekend&&d.getDay()===0?'sun':'',isOff?'rest':''].filter(Boolean).join(' ');
    const el=document.createElement('div'); el.className=rowCls; el.id=`row-${i}`;
    el.innerHTML=`
      <div class="day-header" onclick="toggleRow(${i})">
        <span class="day-num">${dateStr}</span><span class="day-youbi">${r.youbi}</span>
        <span class="day-summary">${summary}</span>${badge}<span class="chevron">▶</span>
      </div>
      <div class="day-body">
        <div class="quick-btns">
          ${TYPES.map(t=>`<button class="quick-btn qb-${t}${r.type===t?' on':''}" onclick="setType(${i},'${t}')">${TYPE_LABEL[t]}</button>`).join('')}
        </div>
        <div id="wf-${i}" style="${!isOff?'':'display:none'}">

            <div class="field full"><label>現場名</label>

                  id="sel-${i}">

                  ${siteList.map(s=>`<option value="${s}" ${r.site===s?'selected':''}>${s}</option>`).join('')}

                  style="flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;padding:8px 10px;outline:none;display:${siteList.some(s=>s===r.site)||!r.site?'none':'block'};"
                  id="inp-${i}"

                <button onclick="document.getElementById('sel-${i}').style.display='flex';document.getElementById('inp-${i}').style.display='none';updateRow(${i},'site','');"

                  id="back-${i}">戻る</button>

                oninput="updateRow(${i},'task',this.value)" onchange="updateRow(${i},'task',this.value)"></div>
            <div class="field"><label>始業時間</label>
              <input type="time" value="${r.start||DEFAULT_START}"
                oninput="updateRow(${i},'start',this.value)" onchange="updateRow(${i},'start',this.value)"></div>

              <input type="time" value="${r.end||DEFAULT_END}"
                oninput="updateRow(${i},'end',this.value)" onchange="updateRow(${i},'end',this.value)"></div>

function toggleRow(i){
  const t=document.getElementById(`row-${i}`), open=t.classList.contains('open');
  document.querySelectorAll('.day-row.open').forEach(el=>el.classList.remove('open'));
  if(!open) t.classList.add('open');
}
function setType(i,type){
  rows[i].type=type;
  if(type!=='work'&&type!=='holi-work'){rows[i].site='';rows[i].task='';rows[i].start='';rows[i].end='';rows[i].hayade='';rows[i].zangyo='';}
  else{if(!rows[i].start)rows[i].start=DEFAULT_START;if(!rows[i].end)rows[i].end=DEFAULT_END;}
  const wasOpen=document.getElementById(`row-${i}`).classList.contains('open');
  renderDays(); saveData(); if(wasOpen) document.getElementById(`row-${i}`).classList.add('open');
}
function updateRow(i,key,val){
  rows[i][key]=val; updateSummary(); saveData();
  const r=rows[i], el=document.querySelector(`#row-${i} .day-summary`);
  if(el) el.innerHTML=(r.type==='work'||r.type==='holi-work')?(r.site?`${r.site}${r.task?'　'+r.task:''}`:'<span class="empty">未入力</span>'):TYPE_LABEL[r.type];

function updateSummary(){
  const w=rows.filter(r=>r.type==='work').length, h=rows.filter(r=>r.type==='holi-work').length;
  const p=rows.filter(r=>r.type==='paid').length, d=rows.filter(r=>r.type==='daikyu').length, a=rows.filter(r=>r.type==='absent').length;
  document.getElementById('sumWork').textContent=w; document.getElementById('sumPaid').textContent=p;
  document.getElementById('sumDaikyu').textContent=d; document.getElementById('sumHoliWork').textContent=h;
  document.getElementById('sumAbsent').textContent=a; document.getElementById('sumBase').textContent=w+p+d+a;
  document.getElementById('sumTotal').textContent=w+h;
  const hy=rows.reduce((s,r)=>s+parseFloat(r.hayade||0),0);
  document.getElementById('sumHayade').textContent=hy%1===0?hy:hy.toFixed(1);
  const z=rows.reduce((s,r)=>s+parseFloat(r.zangyo||0),0);
  document.getElementById('sumZangyo').textContent=z%1===0?z:z.toFixed(1);
  // 代休残日数 = 前月残 + 今月休日出勤 - 今月代休使用
  const prevD = parseInt(document.getElementById('prevDaikyu').value)||0;
  const holiW = rows.filter(r=>r.type==='holi-work').length;
  const daik  = rows.filter(r=>r.type==='daikyu').length;
  document.getElementById('sumDaikyuZan').textContent = Math.max(0, prevD + holiW - daik);
}

let _gistSaveTimer = null;
function saveData(){
  try{localStorage.setItem(GLOBAL_KEY,JSON.stringify({name:document.getElementById('name').value,siteList,workerList,yearmonth:document.getElementById('yearmonth').value}));}catch(e){}
  const ym=document.getElementById('yearmonth').value; if(!ym)return;
  const defS=DEFAULT_START,defE=DEFAULT_END;
  try{localStorage.setItem(monthKey(ym),JSON.stringify({
    prevDaikyu:document.getElementById('prevDaikyu').value,
    tantoSites:getTantoSites(),
    kanriSite:document.getElementById('kanriSiteSelect').value,
    kanriTanto:document.getElementById('kanriTanto').value,
    kanriWorkers:kanriWorkersByIdx,
    honninComment: document.getElementById('honninComment').value,
    yoboJiko:      document.getElementById('yoboJiko').value,
    goalShigoto:   document.getElementById('goalShigoto').value,
    goalJinkaku:   document.getElementById('goalJinkaku').value,
    goalSonota:    document.getElementById('goalSonota').value,
    rows:rows.map(r=>({type:r.type,site:r.site,task:r.task,
      start:(r.type==='work'||r.type==='holi-work')?(r.start||defS):r.start,
      end:(r.type==='work'||r.type==='holi-work')?(r.end||defE):r.end,
      hayade:r.hayade,zangyo:r.zangyo}))
  }));showSaveIndicator();}catch(e){}
}
function loadGlobal(){
  try{
    const s=JSON.parse(localStorage.getItem(GLOBAL_KEY)||'null'); if(!s)return;
    if(s.name)document.getElementById('name').value=s.name;
    if(s.siteList){siteList=s.siteList;renderSiteTags();updateDatalist();}
    if(s.workerList){workerList=s.workerList;renderWorkerTags();}
    if(s.yearmonth){const sel=document.getElementById('yearmonth');if([...sel.options].some(o=>o.value===s.yearmonth))sel.value=s.yearmonth;}
  }catch(e){}
}
function getPrevMonthKey(ym) {
  const [y,m] = ym.split('-').map(Number);
  const pm = m===1?12:m-1, py = m===1?y-1:y;
  return monthKey(`${py}-${String(pm).padStart(2,'0')}`);
}

function calcDaikyuZan(monthData) {
  // 前月の合計残日数 = 前月迄の残日数 + 休日出勤 - 代休使用
  if (!monthData) return null;
  const prev   = parseInt(monthData.prevDaikyu||0);
  const holi   = (monthData.rows||[]).filter(r=>r.type==='holi-work').length;
  const daikyu = (monthData.rows||[]).filter(r=>r.type==='daikyu').length;
  return prev + holi - daikyu;
}

function loadMonthData(ym){
  try{
    const s=JSON.parse(localStorage.getItem(monthKey(ym))||'null');
    // 前月から代休残日数を計算（常に最新の前月データを反映）
    try {
      const prevData = JSON.parse(localStorage.getItem(getPrevMonthKey(ym))||'null');
      const zan = calcDaikyuZan(prevData);
      if (zan !== null) {
        document.getElementById('prevDaikyu').value = Math.max(0, zan);
      } else if (s?.prevDaikyu !== undefined) {
        document.getElementById('prevDaikyu').value = s.prevDaikyu;
      }
    } catch(e2) {
      if (s?.prevDaikyu !== undefined) document.getElementById('prevDaikyu').value = s.prevDaikyu;
    }
    if(s?.tantoSites)setTantoSites(s.tantoSites);else setTantoSites([]);
    // 現場管理日程表
    updateKanriSiteSelect();
    if(s?.kanriSite){const sel=document.getElementById('kanriSiteSelect');if([...sel.options].some(o=>o.value===s.kanriSite))sel.value=s.kanriSite;}
    document.getElementById('kanriTanto').value = s?.kanriTanto || '';
    // 旧形式(配列)は無視、新形式(オブジェクト)のみ復元
    kanriWorkersByIdx = (s?.kanriWorkers && !Array.isArray(s.kanriWorkers)) ? s.kanriWorkers : {};
    document.getElementById('honninComment').value = s?.honninComment || '';
    document.getElementById('yoboJiko').value      = s?.yoboJiko      || '';
    // 目標は空なら前月からコピー
    try {
      const prevData = JSON.parse(localStorage.getItem(getPrevMonthKey(ym))||'null');
      document.getElementById('goalShigoto').value = s?.goalShigoto || prevData?.goalShigoto || '';
      document.getElementById('goalJinkaku').value = s?.goalJinkaku || prevData?.goalJinkaku || '';
      document.getElementById('goalSonota').value  = s?.goalSonota  || prevData?.goalSonota  || '';
    } catch(e) {
      document.getElementById('goalShigoto').value = s?.goalShigoto || '';
      document.getElementById('goalJinkaku').value = s?.goalJinkaku || '';
      document.getElementById('goalSonota').value  = s?.goalSonota  || '';
    }
    if(s?.rows?.length){
      buildDays(); const defS=DEFAULT_START,defE=DEFAULT_END;
      s.rows.forEach((sv,i)=>{if(!rows[i])return;Object.assign(rows[i],sv);
        if(rows[i].type==='work'||rows[i].type==='holi-work'){if(!rows[i].start)rows[i].start=defS;if(!rows[i].end)rows[i].end=defE;}});
      renderDays();
    }else buildDays();
  }catch(e){buildDays();}
}
function showSaveIndicator(){const el=document.getElementById('saveIndicator');el.style.opacity='1';clearTimeout(el._t);el._t=setTimeout(()=>el.style.opacity='0',1500);}
['prevDaikyu'].forEach(id=>{document.getElementById(id).addEventListener('input',saveData);document.getElementById(id).addEventListener('change',saveData);});
document.getElementById('name').addEventListener('input',saveData);
document.getElementById('yearmonth').addEventListener('change',()=>{loadMonthData(document.getElementById('yearmonth').value);saveData();});

// ── JSON ──
function exportJSON(){
  const all={global:null,months:{}};
  try{all.global=JSON.parse(localStorage.getItem(GLOBAL_KEY)||'null');}catch(e){}
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k?.startsWith('sakugyo_month_'))try{all.months[k]=JSON.parse(localStorage.getItem(k));}catch(e){}}
  const blob=new Blob([JSON.stringify(all,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  const now=new Date();a.href=url;a.download=`作業月報バックアップ_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.json`;
  a.click();URL.revokeObjectURL(url);showToast('💾 バックアップしました');
}
function importJSON(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{try{const all=JSON.parse(e.target.result);
    if(all.global)localStorage.setItem(GLOBAL_KEY,JSON.stringify(all.global));
    if(all.months)Object.entries(all.months).forEach(([k,v])=>localStorage.setItem(k,JSON.stringify(v)));
    loadGlobal();loadMonthData(document.getElementById('yearmonth').value);showToast('✅ 読み込みました');
  }catch(err){showToast('❌ 読み込みエラー');}};
  reader.readAsText(file);input.value='';
}

function downloadB64(b64,filename){
  const bin=atob(b64),buf=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)buf[i]=bin.charCodeAt(i);
  const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
}

const GIST_DESC = '作業月報データ';
const GIST_FILE = 'sakugyo_geppo.json';

function getToken() {
  return document.getElementById('githubToken').value ||
         localStorage.getItem('gist_token') || '';
}

async function gistSave(silent=false) {
  const token = getToken();
  if (!token) { if(!silent) showToast('❌ GitHubトークンを入力してください'); return; }
  if(!silent) showToast('☁️ 保存中...');
  try {
    // 全データを収集
    const all = { global: null, months: {} };
    try { all.global = JSON.parse(localStorage.getItem(GLOBAL_KEY)||'null'); } catch(e) {}
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k?.startsWith('sakugyo_month_')) {
        try { all.months[k] = JSON.parse(localStorage.getItem(k)); } catch(e) {}
      }
    }
    const content = JSON.stringify(all, null, 2);

    // 既存GistのIDを確認
    let gistId = localStorage.getItem('gist_id');

    if (gistId) {
      // 既存Gistを更新
      const res = await fetch(`https://api.github.com/gists/${gistId}`, {
        method: 'PATCH',
        headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ files: { [GIST_FILE]: { content } } })
      });
      if (!res.ok) throw new Error('更新失敗: ' + res.status);
    } else {
      // 新規Gist作成
      const res = await fetch('https://api.github.com/gists', {
        method: 'POST',
        headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          description: GIST_DESC,
          public: false,
          files: { [GIST_FILE]: { content } }
        })
      });
      if (!res.ok) throw new Error('作成失敗: ' + res.status);
      const data = await res.json();
      localStorage.setItem('gist_id', data.id);
    }
    if(!silent) showToast('✅ クラウドに保存しました');
  } catch(e) {
    showToast('❌ ' + e.message);
    console.error(e);
  }
}

async function gistLoad(silent=false) {
  const token = getToken();
  if (!token) { if(!silent) showToast('❌ GitHubトークンを入力してください'); return; }
  if(!silent) showToast('🔄 読み込み中...');
  try {
    // Gist一覧から「作業月報データ」を検索
    let gistId = localStorage.getItem('gist_id');

    if (!gistId) {
      // GistIDがない場合は一覧から検索
      const res = await fetch('https://api.github.com/gists?per_page=100', {
        headers: { 'Authorization': `token ${token}` }
      });
      const list = await res.json();
      const found = list.find(g => g.description === GIST_DESC && g.files[GIST_FILE]);
      if (!found) { showToast('❌ クラウドデータが見つかりません。先に保存してください。'); return; }
      gistId = found.id;
      localStorage.setItem('gist_id', gistId);
    }

    // Gistの内容を取得
    const res = await fetch(`https://api.github.com/gists/${gistId}`, {
      headers: { 'Authorization': `token ${token}` }
    });
    const gist = await res.json();
    const content = gist.files[GIST_FILE]?.content;
    if (!content) throw new Error('データが空です');

    const all = JSON.parse(content);
    if (all.global) localStorage.setItem(GLOBAL_KEY, JSON.stringify(all.global));
    if (all.months) Object.entries(all.months).forEach(([k,v]) => localStorage.setItem(k, JSON.stringify(v)));

    loadGlobal();
    loadMonthData(document.getElementById('yearmonth').value);
    if(!silent) showToast('✅ クラウドから読み込みました'); else showToast('☁️ クラウドから読み込みました');
  } catch(e) {
    showToast('❌ ' + e.message);
    console.error(e);
  }
}

async function exportKanriReport(){
  if(!pyodide){showToast('⏳ 準備中です');return;}
  const site = document.getElementById('kanriSiteSelect').value;
  if(!site){showToast('⚠️ 現場を選択してください');return;}
  const btn = document.getElementById('kanriBtn');
  btn.disabled=true; btn.textContent='⏳ 出力中...';
  try{
    const ym = document.getElementById('yearmonth').value;
    const [y,m] = ym.split('-').map(Number);
    const name = document.getElementById('name').value;
    const tanto = document.getElementById('kanriTanto').value.trim();
    const payload = JSON.stringify({
      name, yearmonth:ym, kanriSite:site, kanriTanto:tanto,
      kanriWorkersByIdx:kanriWorkersByIdx, rows:rows
    });
    pyodide.globals.set('_kanri_payload', payload);
    pyodide.globals.set('_kanri_tmpl_b64', KANRI_TMPL_B64);
    // PythonコードをUTF-8対応でデコード（atobは日本語を壊すため）
    pyodide.runPython(new TextDecoder().decode(Uint8Array.from(atob(KANRI_PY_B64), c=>c.charCodeAt(0))));
    const b64 = pyodide.runPython('generate_kanri_report(_kanri_payload, _kanri_tmpl_b64)');
    if(!b64){showToast('❌ 該当日がありません');return;}
    const disp_m = m<12?m+1:1, disp_y = m<12?y:y+1;
    downloadB64(b64, `現場管理日程表_${site}_${disp_y}年${disp_m}月.xlsx`);
    showToast('✅ 現場管理日程表を出力しました');
  }catch(e){showToast('❌ エラー: '+e.message.slice(0,60));console.error(e);}
  btn.disabled=false; btn.textContent='📊 現場管理日程表';
}


// ── 現場管理日程表出力 ──
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}

const savedToken = localStorage.getItem('gist_token');
if (savedToken) document.getElementById('githubToken').value = savedToken;

buildMonthSelect();
loadGlobal();
loadMonthData(document.getElementById('yearmonth').value);

// トークンがあれば起動時に自動クラウド読み込み
if (savedToken) {
  setTimeout(async () => {
    try {
      await gistLoad(true); // silent=trueで成功時のトーストのみ表示
    } catch(e) {}
  }, 500);
}

pyScript.src='https://cdn.jsdelivr.net/pyodide/v0.26.2/full/pyodide.js';
pyScript.onload=initPyodide;
pyScript.onerror=()=>setStatus('⚠️ CDNに接続できません。Wi-Fi・ネット接続を確認してください。',false);
document.head.appendChild(pyScript);
